<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>THEKLA – Contact</title>
  <link rel="stylesheet" href="style.css" />
    <!-- FAVICON (browser tab icon) -->
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <!-- Optional but recommended -->
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
</head>
<body>
  <div class="page-wrapper">
    <header class="navbar">
<a href="index.html" class="brand">THEKLA</a>  <!-- NOW LINKS TO HOME -->
      <nav class="nav-links">
        <a href="collection.html">Collection</a>
        <a href="about.html">About</a>
        <a href="stores.html">Stores</a>
        <a class="active" href="contact.html">Contact</a>
      </nav>
    </header>

    <main class="section">
      <div class="section-header">
        <h1 class="section-title">Contact &amp; Bespoke</h1>
        <p class="section-subtitle">
          For styling advice, bespoke projects or wholesale enquiries, share a few details below.
        </p>
      </div>

      <form class="contact-form">
        <label>
          Name
          <input type="text" name="name" placeholder="Your full name" required />
        </label>
        <label>
          Email
          <input type="email" name="email" placeholder="you@example.com" required />
        </label>
        <label>
          Topic
          <input type="text" name="topic" placeholder="Order, styling, wholesale…" />
        </label>
        <label>
          Message
          <textarea name="message" placeholder="Tell us how we can help"></textarea>
        </label>
        <button type="submit" class="hero-cta">Send Message</button>
      </form>
    </main>
  </div>
</body>
</html>
