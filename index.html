<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>THEKLA – Elegant & Luxury Jewelry</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-wrapper">
    <div class="glow"></div>
    <div class="star">✦</div>

    <header class="navbar">
      <div class="brand">THEKLA</div>
      <nav class="nav-links">
        <a href="collection.html">Collection</a>
        <a href="about.html">About</a>
        <a href="stores.html">Stores</a>

        <div class="hero-line">

          <svg viewBox="0 0 400 80" preserveAspectRatio="none">
            <path d="M0,60 Q100,10 200,40 T400,50"
                  fill="none"
                  stroke="rgba(255,255,255,0.4)"
                  stroke-width="1.2" />
